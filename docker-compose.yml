services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional Redis for dedup / rate limiting (not required for MVP)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
