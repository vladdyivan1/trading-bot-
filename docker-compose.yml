services:
  backend:
    build: .
    container_name: tv-0dte-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tv-0dte-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
