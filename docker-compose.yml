services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/scalper.db
      - EXECUTION_MODE=paper
      - ENABLE_BROKER_EXECUTION=false
      - ENABLE_AI_FILTER=true
      - ENABLE_NEWS_FILTER=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional Redis for alert deduplication across instances
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - redis
